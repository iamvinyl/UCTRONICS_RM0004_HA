configuration:
  show_home_assistant_logo:
    name: Home Assistant logo
    description: Show the blue-and-white Home Assistant logo on the full-color LCD.
  show_ip_address:
    name: Host IP address
    description: Show the primary Home Assistant host IPv4 address reported by Supervisor.
  show_cpu_usage:
    name: CPU usage
    description: Show current CPU usage with a green progress bar.
  show_ram_usage:
    name: RAM usage
    description: Show current RAM usage with a yellow progress bar.
  show_disk_space:
    name: Host disk space
    description: Show Home Assistant host disk usage with a blue progress bar.
  screen_duration:
    name: Screen duration
    description: Number of seconds each enabled screen remains visible.
